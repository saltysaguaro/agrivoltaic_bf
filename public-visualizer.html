<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>Agrivoltaic Shade Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./public-visualizer.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
        }
      }
    </script>
    <script src="./public-visualizer.config.js"></script>
  </head>
  <body class="public-visualizer-body">
    <div class="public-visualizer-page">
      <header class="pv-topbar">
        <div class="pv-topbar-head">
          <div>
            <p class="pv-eyebrow">Agrivoltaic Shade Visualizer</p>
            <h1 id="sceneHeading">55 kW system shade preview</h1>
          </div>
          <div class="pv-toolbar">
            <button class="pv-ghost-button" type="button" data-view-preset="rowOblique">Row View</button>
            <button class="pv-ghost-button" type="button" data-view-preset="arrayOblique">Array View</button>
            <button id="copyLinkButton" class="pv-ghost-button" type="button">Copy Link</button>
            <button id="snapshotButton" class="pv-primary-button" type="button">PNG</button>
          </div>
        </div>

        <div class="pv-controls">
          <section class="pv-panel pv-panel--control pv-control pv-control--site">
            <label class="pv-label" for="siteSearchInput">Location</label>
            <div class="pv-search-shell">
              <input
                id="siteSearchInput"
                class="pv-input"
                type="text"
                autocomplete="off"
                placeholder="Search address or place"
              />
              <div id="siteSuggestions" class="pv-suggestion-list" role="listbox" aria-label="Location suggestions"></div>
            </div>
          </section>

          <section class="pv-panel pv-panel--control pv-control pv-control--system">
            <span class="pv-label">Configuration</span>
            <div id="systemSelector" class="pv-system-grid" role="radiogroup" aria-label="System type"></div>
          </section>

          <section class="pv-panel pv-panel--control pv-control pv-control--date">
            <label class="pv-label" for="dateInput">Date</label>
            <input id="dateInput" class="pv-input" type="date" />
          </section>

          <section class="pv-panel pv-panel--control pv-control pv-control--time">
            <div class="pv-control-head">
              <label class="pv-label" for="timeInput">Hour</label>
              <strong id="timeDisplay">10:00 AM</strong>
            </div>
            <input id="timeInput" class="pv-input" type="time" step="900" />
          </section>
        </div>

        <div class="pv-meta-row">
          <div class="pv-site-chip">
            <div class="pv-site-chip__content">
              <span id="selectedSiteLabel" class="pv-site-chip__title">Golden, Colorado</span>
              <span id="selectedSiteMeta" class="pv-site-chip__meta">39.7555, -105.2211</span>
            </div>
            <span id="timezoneBadge" class="pv-badge">America/Denver</span>
          </div>
          <div class="pv-meta-cluster">
            <span id="solarStatus" class="pv-meta-copy">June 21, 10:00 AM • direct shade is active.</span>
            <span id="siteLookupStatus" class="pv-meta-copy"></span>
          </div>
        </div>
      </header>

      <main class="public-visualizer-stage">
        <section class="pv-canvas-card">
          <div id="canvasWrap" class="pv-canvas-wrap">
            <div class="pv-canvas-glow"></div>
            <div class="scene-overlay">
              <div id="overlayTitle" class="scene-overlay__title">Agrivoltaic shade visualizer</div>
              <div id="overlayBody" class="scene-overlay__body">
                Orbit: drag • Zoom: scroll • Pan: right-drag
              </div>
            </div>
            <canvas id="viewportCanvas"></canvas>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./src/public/publicVisualizerPage.js"></script>
  </body>
</html>
